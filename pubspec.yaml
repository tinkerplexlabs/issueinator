name: issueinator
description: TinkerPlex Labs mobile issue triage tool
publish_to: 'none'
version: 0.1.0+103230311

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.0.0
  http: ^1.2.0

  # Auth / Secure Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.0
  google_sign_in: ^6.2.1

  # State management
  provider: ^6.1.0
  get_it: ^7.6.0

  # Utilities
  crypto: ^3.0.7
  collection: ^1.18.0
  intl: ^0.19.0
  url_launcher: ^6.2.0
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10
  device_info_plus: ^9.1.2
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.4
  mockito: ^5.4.0
  test: ^1.24.0

flutter_launcher_icons:
  android: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#F5F0E8"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter_native_splash:
  color: "#F5F0E8"
  image: "assets/images/app_icon.png"
  android_12:
    color: "#F5F0E8"
    image: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
