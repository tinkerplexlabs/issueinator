name: Build and Deploy to Play Store

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      track:
        description: 'Deployment track (internal/alpha/beta/production)'
        required: true
        default: 'internal'
        type: choice
        options:
        - internal
        - alpha
        - beta
        - production

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.38.x'
        channel: 'stable'
        cache: true

    - name: Verify Flutter installation
      run: |
        flutter --version
        flutter doctor -v
        dart --version

    - name: Get Flutter dependencies
      run: |
        sed -i '/^resolution: workspace$/d' pubspec.yaml
        flutter pub get

    - name: Run analysis
      run: flutter analyze

  build-and-deploy:
    name: Build and Deploy to Play Store
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.38.x'
        channel: 'stable'
        cache: true

    - name: Get Flutter dependencies
      run: |
        sed -i '/^resolution: workspace$/d' pubspec.yaml
        flutter pub get

    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Decode keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore-issueinator.p12

    - name: Create key.properties
      run: |
        echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
        echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
        echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
        echo "storeFile=upload-keystore-issueinator.p12" >> android/key.properties

    - name: Determine deployment track
      id: track
      run: |
        TRACK="internal"

        if [ "${{ github.event.inputs.track }}" != "" ]; then
          TRACK="${{ github.event.inputs.track }}"
          echo "Using manual track selection: $TRACK"
        elif [ "${{ github.event_name }}" = "release" ]; then
          TAG_NAME="${{ github.event.release.tag_name }}"
          echo "Analyzing tag: $TAG_NAME"

          if [[ $TAG_NAME =~ ^v[0-9]+\.[0-9]+\.[0-9]+-alpha(\.[0-9]+)?$ ]]; then
            TRACK="alpha"
          elif [[ $TAG_NAME =~ ^v[0-9]+\.[0-9]+\.[0-9]+-beta(\.[0-9]+)?$ ]]; then
            TRACK="beta"
          elif [[ $TAG_NAME =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc(\.[0-9]+)?$ ]]; then
            TRACK="beta"
          elif [[ $TAG_NAME =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TRACK="production"
          else
            TRACK="internal"
          fi
        fi

        echo "TRACK=$TRACK" >> $GITHUB_OUTPUT
        echo "Deploying to track: $TRACK"

    - name: Extract version from tag
      id: version
      run: |
        if [ "${{ github.event_name }}" = "release" ]; then
          TAG_NAME=${{ github.event.release.tag_name }}
        else
          TAG_NAME=$(git describe --tags --abbrev=0 || echo "v0.1.0")
        fi
        VERSION_NAME=${TAG_NAME#v}
        VERSION_NAME=${VERSION_NAME%%-*}
        echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "Version: $VERSION_NAME"

    - name: Update version in files
      run: |
        CURRENT_YEAR=$(date -u +"%Y")
        YEAR_OFFSET=$((CURRENT_YEAR - 2025))
        TIMESTAMP_VERSION_CODE=$(printf "%02d%s" $YEAR_OFFSET $(date -u +"%m%d%H%M"))
        VERSION_CODE=$((10#$TIMESTAMP_VERSION_CODE))

        echo "Using timestamp-based version code: $VERSION_CODE"

        sed -i "s/^version:.*/version: ${{ steps.version.outputs.VERSION_NAME }}+${VERSION_CODE}/" pubspec.yaml

    - name: Verify signing setup
      run: |
        echo "Checking keystore file:"
        ls -la android/app/upload-keystore-issueinator.p12 || echo "Keystore file not found!"
        echo ""
        echo "Checking key.properties:"
        cat android/key.properties || echo "key.properties not found!"

    - name: Build App Bundle
      run: |
        flutter build appbundle --release

    - name: Verify AAB exists
      run: |
        echo "Checking for AAB file..."
        ls -la build/app/outputs/bundle/release/
        if [ ! -f "build/app/outputs/bundle/release/app-release.aab" ]; then
          echo "ERROR: AAB file not found!"
          exit 1
        fi
        echo "AAB file found"

    - name: Generate Release Notes
      id: changelog
      run: |
        VERSION="${{ steps.version.outputs.VERSION_NAME }}"
        CURRENT_BRANCH="${GITHUB_REF_NAME:-$(git rev-parse --abbrev-ref HEAD)}"
        CURRENT_COMMIT=$(git rev-parse --short HEAD)
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

        COMMIT_COUNT=0
        COMMIT_LIST=""
        HIGHLIGHT=""

        if [ -n "$PREV_TAG" ]; then
          COMMIT_COUNT=$(git rev-list --count "$PREV_TAG"..HEAD 2>/dev/null || echo "0")

          if [ "$COMMIT_COUNT" -gt 0 ]; then
            COMMITS=$(git log "$PREV_TAG"..HEAD --oneline --no-merges 2>/dev/null || echo "")

            COMMIT_LIST=$(echo "$COMMITS" | head -20 | while read -r line; do
              MSG=$(echo "$line" | sed 's/^[a-f0-9]* //')
              echo "* $MSG"
            done)

            HIGHLIGHT=$(echo "$COMMITS" | head -1 | sed 's/^[a-f0-9]* //')
          fi
        else
          HIGHLIGHT="Initial release"
        fi

        echo "$CURRENT_BRANCH" > /tmp/release_branch.txt
        echo "$CURRENT_COMMIT" > /tmp/release_commit.txt
        echo "$PREV_TAG" > /tmp/prev_tag.txt
        echo "$COMMIT_COUNT" > /tmp/commit_count.txt
        echo "$HIGHLIGHT" > /tmp/release_highlight.txt
        echo "$COMMIT_LIST" > /tmp/commit_list.txt

        mkdir -p distribution/whatsnew
        RELEASE_BODY="${{ github.event.release.body }}"

        if [ -n "$RELEASE_BODY" ]; then
          echo "$RELEASE_BODY" > distribution/whatsnew/whatsnew-en-US
        else
          {
            echo "IssueInator v$VERSION"
            echo ""
            if [ -n "$HIGHLIGHT" ]; then
              echo "$HIGHLIGHT"
            fi
          } > distribution/whatsnew/whatsnew-en-US
        fi

        head -c 500 distribution/whatsnew/whatsnew-en-US > /tmp/whatsnew && mv /tmp/whatsnew distribution/whatsnew/whatsnew-en-US

    - name: Upload to Play Store
      id: upload
      uses: r0adkll/upload-google-play@v1.1.3
      with:
        serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        packageName: com.tinkerplexlabs.issueinator
        releaseFiles: build/app/outputs/bundle/release/app-release.aab
        track: ${{ steps.track.outputs.TRACK }}
        status: completed
        inAppUpdatePriority: 2
        whatsNewDirectory: distribution/whatsnew

    - name: Check Upload Result
      if: failure()
      run: |
        echo "============================================"
        echo "UPLOAD TO PLAY STORE FAILED"
        echo "============================================"
        echo ""
        echo "Common causes:"
        echo "1. Service account not linked in Play Console → Settings → API access"
        echo "2. Google Play Android Developer API not enabled in Google Cloud Console"
        echo "3. Insufficient permissions on the app"
        echo "4. App not fully set up (missing store listing, content rating, etc.)"
        echo "5. Version code conflict (must be higher than existing uploads)"
        echo "============================================"
        exit 1

    - name: Deployment Summary
      if: steps.upload.outcome == 'success'
      run: |
        VERSION="${{ steps.version.outputs.VERSION_NAME }}"
        TRACK="${{ steps.track.outputs.TRACK }}"

        echo "## Deployment Successful" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Version | $VERSION |" >> $GITHUB_STEP_SUMMARY
        echo "| Track | $TRACK |" >> $GITHUB_STEP_SUMMARY
        echo "| Package | com.tinkerplexlabs.issueinator |" >> $GITHUB_STEP_SUMMARY

    - name: Add Comment to Release Log Issue
      if: steps.upload.outcome == 'success'
      env:
        GH_TOKEN: ${{ github.token }}
        VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
        TRACK: ${{ steps.track.outputs.TRACK }}
        TAG_NAME: ${{ github.event.release.tag_name || 'manual' }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        CURRENT_BRANCH=$(cat /tmp/release_branch.txt 2>/dev/null || echo "unknown")
        CURRENT_COMMIT=$(cat /tmp/release_commit.txt 2>/dev/null || echo "unknown")
        PREV_TAG=$(cat /tmp/prev_tag.txt 2>/dev/null || echo "")
        COMMIT_COUNT=$(cat /tmp/commit_count.txt 2>/dev/null || echo "0")
        HIGHLIGHT=$(cat /tmp/release_highlight.txt 2>/dev/null || echo "")
        COMMIT_LIST=$(cat /tmp/commit_list.txt 2>/dev/null || echo "")

        ISSUE_NUMBER=$(gh issue list --label "release-log" --state open --json number -q '.[0].number')

        if [ -z "$ISSUE_NUMBER" ]; then
          gh label create "release-log" --description "Deployment release log" --color "0052CC" 2>/dev/null || true

          ISSUE_URL=$(gh issue create \
            --title "RELEASE LOG - IssueInator" \
            --body "This issue tracks all deployments to Google Play Store. Each successful deployment adds a comment below." \
            --label "release-log")

          ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
        fi

        PREV_INFO=""
        if [ -n "$PREV_TAG" ] && [ "$COMMIT_COUNT" -gt 0 ]; then
          PREV_INFO="| Previous | $PREV_TAG ($COMMIT_COUNT commits) |"
        fi

        {
          echo "## v$VERSION_NAME deployed to $TRACK"
          echo ""
          if [ -n "$HIGHLIGHT" ]; then
            echo "**Highlight:** $HIGHLIGHT"
            echo ""
          fi
          echo "| Property | Value |"
          echo "|----------|-------|"
          echo "| Version | $VERSION_NAME |"
          echo "| Track | $TRACK |"
          echo "| Branch | $CURRENT_BRANCH |"
          echo "| Tag | $TAG_NAME |"
          if [ -n "$PREV_INFO" ]; then
            echo "$PREV_INFO"
          fi
          echo "| Deployed at | $(date -u '+%Y-%m-%d %H:%M UTC') |"
          echo "| Workflow | [View run]($RUN_URL) |"
          echo ""
          if [ -n "$COMMIT_LIST" ]; then
            echo "<details>"
            echo "<summary>Commits since $PREV_TAG</summary>"
            echo ""
            echo "$COMMIT_LIST"
            echo ""
            echo "</details>"
          fi
        } > /tmp/release_comment.md

        gh issue comment "$ISSUE_NUMBER" --body-file /tmp/release_comment.md
